# .amber/capabilities-audit.yaml
# Business audit fields (B79). Sidecar to capabilities.md.
capabilities:
  tempo.api:
    mission: "Provide a stable, versioned liveness endpoint for deployment verification and PWA integration."
    owner: "engineering"
    sla: "Response < 100 ms; static, no runtime dependencies"
    dependencies:
      - "next/server NextResponse"
    risks:
      - "Version string in this route is not automatically kept in sync with CURRENT_DATA_VERSION in src/lib/sync — drift will cause smoke tests to pass against a stale schema signal"
    data_classes:
      - "operational"
    recovery_time: "instant (statically compiled route)"
    stakeholders:
      - "engineering"
  tempo.goals:
    mission: "Help musicians set measurable practice intentions and surface live progress so they can course-correct before a deadline or week ends."
    owner: "product / frontend"
    sla: "Goal evaluation < 100 ms against full local session history"
    dependencies:
      - "src/lib/sessions"
      - "src/lib/state/store"
      - "src/lib/types"
      - "src/components/shared/ui"
    risks:
      - "evaluateGoal accuracy depends on complete local session history; data clear produces false missed-goal status"
    data_classes:
      - "operational"
    recovery_time: "instant (client-only)"
    stakeholders:
      - "product"
      - "engineering"
  tempo.instruments:
    mission: "Let musicians register and manage the instruments they practise, with a primary designation that removes daily setup friction."
    owner: "product / frontend"
    sla: "List render < 200 ms; no network dependency"
    dependencies:
      - "src/lib/persistence (via src/lib/instruments)"
      - "src/lib/state/store"
      - "src/lib/types"
      - "src/components/shared/ui"
    risks:
      - "Deleting the only instrument leaves primary unset, breaking the timer's default instrument"
    data_classes:
      - "operational"
    recovery_time: "instant (local IndexedDB)"
    stakeholders:
      - "product"
      - "engineering"
  tempo.persistence:
    mission: "Provide reliable, versioned, offline-capable local storage so all Tempo capabilities function without network access."
    owner: "engineering"
    sla: "getDB open < 50 ms; individual record read/write < 10 ms"
    dependencies:
      - "IndexedDB (browser API)"
      - "src/lib/types"
    risks:
      - "IndexedDB storage quota exceeded on very large session histories"
      - "Safari private-browsing mode restricts IndexedDB to session-scoped storage"
      - "Schema migration on version bump risks silent data loss if migration logic is absent"
    data_classes:
      - "operational"
    recovery_time: "no automatic recovery; data loss on browser storage clear unless user holds an export"
    stakeholders:
      - "engineering"
      - "product"
  tempo.pieces:
    mission: "Give musicians visibility into their full repertoire and the cumulative time invested in each piece."
    owner: "product / frontend"
    sla: "List render < 300 ms; detail aggregation < 150 ms for 60 days of sessions"
    dependencies:
      - "src/lib/pieces"
      - "src/lib/state/store"
      - "src/lib/util/date"
      - "src/lib/persistence"
    risks:
      - "Low cohesion (0.34) between list and detail pages indicates split risk as piece editing or filtering features are added"
      - "pieceRotation neglect flag uses a 14-day threshold hardcoded in lib — changing the rule requires a lib change"
    data_classes:
      - "operational"
    recovery_time: "instant (client-only)"
    stakeholders:
      - "product"
      - "engineering"
  tempo.sessions:
    mission: "Expose complete practice history with filtering and correction capabilities so musicians trust the accuracy of their log."
    owner: "product / frontend"
    sla: "Client-side filter response < 100 ms for up to 10,000 sessions"
    dependencies:
      - "src/lib/sessions"
      - "src/lib/state/store"
      - "src/lib/util/date"
      - "src/lib/types"
    risks:
      - "Client-side filtering over very large session arrays will degrade without pagination or virtualisation"
    data_classes:
      - "operational"
    recovery_time: "instant (client-only)"
    stakeholders:
      - "product"
      - "engineering"
  tempo.stats:
    mission: "Surface practice patterns from local session history to help musicians make informed decisions about how they spend their practice time."
    owner: "product / frontend"
    sla: "Full page render < 500 ms for 365 days of sessions"
    dependencies:
      - "src/lib/stats"
      - "src/lib/sessions"
      - "src/lib/pieces"
      - "src/lib/state/store"
    risks:
      - "Low cohesion (0.27) across page, two chart components, and lib — chart components may diverge into separate concerns as visualisation expands"
      - "No lazy loading; all 365 days computed synchronously on mount"
    data_classes:
      - "operational"
    recovery_time: "instant (client-only)"
    stakeholders:
      - "product"
      - "engineering"
  tempo.sync:
    mission: "Uphold the local-first promise by giving users safe, versioned data portability and a clear data-reset path."
    owner: "product / frontend"
    sla: "Export < 1 s for up to 50,000 sessions; import validation and write < 2 s"
    dependencies:
      - "src/lib/sync"
      - "src/lib/persistence (resetDB)"
      - "src/lib/state/store"
      - "src/components/settings/ThemeToggle"
    risks:
      - "Import with a future schema version (> CURRENT_DATA_VERSION) is rejected — users on older builds cannot restore newer backups"
      - "Data clear is irreversible if the user has no prior export"
    data_classes:
      - "operational"
    recovery_time: "instant for clear; recovery requires a prior export file held by the user"
    stakeholders:
      - "product"
      - "engineering"
      - "legal"
  tempo.today:
    mission: "Provide a zero-friction daily practice entry point that builds habit through visible streaks and instant session logging."
    owner: "product / frontend"
    sla: "Page load < 500 ms; timer tick jitter < 50 ms"
    dependencies:
      - "src/lib/sessions"
      - "src/lib/state/store"
      - "src/lib/util/date"
      - "src/lib/seed"
    risks:
      - "Timer drift when tab is backgrounded by browser throttling"
      - "IndexedDB unavailable on first load produces blank today list"
    data_classes:
      - "operational"
    recovery_time: "instant (client-only, no network dependency)"
    stakeholders:
      - "product"
      - "engineering"
